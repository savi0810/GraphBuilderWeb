networks:
  dev:

services:
  nginx:
    image: nginx:stable-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - frontend
    networks:
      - dev

  api:
    build:
      context: ./GraphBuilderWeb
    networks:
      - dev

  frontend:
    build:
      context: ./GraphBuilderFrontend
    networks:
      - dev